# MemoryAI Coding-Guard — Constitution
# 4 core coding principles + anti-sloppy enforcement
# Source-of-truth. All platform files BUILD from this.
# DO NOT edit platform files directly — edit here + rebuild.

[meta]
name        = "memoryai-coding-guard"
version     = "1.0.0"
spec        = "constitution/v1"
license     = "MIT"
homepage    = "https://coding-guard.memoryai.dev"
authors     = ["MemoryAI <hello@memoryai.dev>"]
created     = "2026-06-10"

[anchor]
# Genesis hash — sealed at v1.0.0 release
parent      = "genesis"
hash        = "sha256:PENDING_FIRST_RELEASE"
immutable   = true
co_signers_required = 1

# ─────────────────────────────────────────────────────────────
# 4 KARPATHY PRINCIPLES
# ─────────────────────────────────────────────────────────────

[[rules]]
id          = "think-before-coding"
title       = "Think Before Coding"
weight      = 0.9
severity    = "block"
enforce     = ["pre-edit", "pre-tool-call"]
predicate   = "predicates/think.ts:assumptionsDeclared"
metric      = "assumption_density"
threshold   = 0.7
audio_preamble_vi = "Tôi sẽ nêu giả định trước khi code. Cản nếu sai."
audio_preamble_en = "I'll state assumptions before coding. Stop me if wrong."
short = """
Don't assume. Don't hide confusion. Surface tradeoffs.
"""
long = """
Before implementing:
- State assumptions explicitly. If uncertain, ask.
- If multiple interpretations exist, present them — don't pick silently.
- If a simpler approach exists, say so. Push back when warranted.
- If something is unclear, stop. Name what's confusing. Ask.
"""

[[rules]]
id          = "simplicity-first"
title       = "Simplicity First"
weight      = 1.0
severity    = "warn"
enforce     = ["post-edit"]
predicate   = "predicates/simple.ts:complexityBudget"
metric      = "loc_delta_percentile"
threshold   = 1.5
audio_preamble_vi = "Code tối thiểu giải bài toán. Không dư thừa."
audio_preamble_en = "Minimum code that solves the problem. Nothing speculative."
short = """
Minimum code that solves the problem. Nothing speculative.
"""
long = """
- No features beyond what was asked.
- No abstractions for single-use code.
- No flexibility or configurability that wasn't requested.
- No error handling for impossible scenarios.
- If 200 lines could be 50, rewrite it.
Senior-engineer test: would they say this is overcomplicated? If yes, simplify.
"""

[[rules]]
id          = "surgical-changes"
title       = "Surgical Changes"
weight      = 1.0
severity    = "block"
enforce     = ["post-edit", "pre-commit"]
predicate   = "predicates/surgical.ts:diffScopePurity"
metric      = "diff_scope_purity"
threshold   = 1.0
audio_preamble_vi = "Chỉ sửa cái user yêu cầu. Không refactor lan."
audio_preamble_en = "Touch only what you must. Match existing style."
short = """
Touch only what you must. Clean up only your own mess.
"""
long = """
When editing existing code:
- Don't improve adjacent code, comments, or formatting.
- Don't refactor things that aren't broken.
- Match existing style, even if you'd do it differently.
- If you notice unrelated dead code, mention it — don't delete it.
When your changes create orphans:
- Remove imports/variables/functions that YOUR changes made unused.
- Don't remove pre-existing dead code unless asked.
Test: every changed line traces directly to the request.
"""

[[rules]]
id          = "goal-driven"
title       = "Goal-Driven Execution"
weight      = 0.8
severity    = "block"
enforce     = ["pre-commit", "pre-merge"]
predicate   = "predicates/goal.ts:verificationLoopClosure"
metric      = "verification_loop_closure"
threshold   = 1.0
audio_preamble_vi = "Định nghĩa tiêu chí thành công. Loop đến khi verify."
audio_preamble_en = "Define success criteria. Loop until verified."
short = """
Define success criteria. Loop until verified.
"""
long = """
Transform tasks into verifiable goals:
- "Add validation" → "Write tests for invalid inputs, then make them pass"
- "Fix the bug" → "Write a test that reproduces it, then make it pass"
- "Refactor X" → "Ensure tests pass before and after"
For multi-step tasks, state a brief plan with verification steps.
Strong success criteria let you loop independently. Weak criteria require constant clarification.
"""

# ─────────────────────────────────────────────────────────────
# ANTI-SLOPPY (universal mechanisms across platforms)
# ─────────────────────────────────────────────────────────────

[[rules]]
id          = "anti-hallucinate"
title       = "Never Hallucinate"
weight      = 1.0
severity    = "block"
enforce     = ["pre-edit", "pre-tool-call"]
short = "Verify imports vs lockfile. Read file before claiming. Cite file:line for API claims."

[[rules]]
id          = "anti-fake-verify"
title       = "Never Fake Verify"
weight      = 1.0
severity    = "block"
enforce     = ["pre-commit", "pre-merge"]
short = "Run real build/test. Paste exit code + last 20 log lines. No --no-verify, no commented asserts."

[[rules]]
id          = "anti-out-of-scope"
title       = "Never Drift Out of Scope"
weight      = 0.9
severity    = "warn"
enforce     = ["post-edit"]
short = "5+ files touched → post plan first. Out-of-scope edit → re-confirm with user."

[[rules]]
id          = "anti-loop"
title       = "Never Mechanical Retry Loop"
weight      = 0.8
severity    = "warn"
enforce     = ["post-tool-call"]
short = "2 fails same way → STOP, diagnose root cause. Tool budget ≤8 calls/task."

[[rules]]
id          = "anti-destructive"
title       = "Never Destructive Without Confirm"
weight      = 1.0
severity    = "block"
enforce     = ["pre-tool-call"]
short = "rm -rf, git push --force, git reset --hard, DROP TABLE → require explicit confirm even in autoApprove."

# ─────────────────────────────────────────────────────────────
# GATES — when each rule fires
# ─────────────────────────────────────────────────────────────

[gates]
pre_tool_call = ["think-before-coding", "anti-hallucinate", "anti-destructive"]
pre_edit      = ["think-before-coding", "anti-hallucinate"]
post_edit     = ["surgical-changes", "simplicity-first", "anti-out-of-scope"]
post_tool_call = ["anti-loop"]
pre_commit    = ["goal-driven", "surgical-changes", "anti-fake-verify"]
pre_merge     = ["goal-driven", "anti-fake-verify"]

# ─────────────────────────────────────────────────────────────
# VERIFICATION GRAPH (Goal-Driven loop)
# ─────────────────────────────────────────────────────────────

[verification_graph]
nodes = ["plan", "tests", "diff", "build", "lint", "review"]
edges = [
  ["plan", "tests"],
  ["tests", "diff"],
  ["diff", "build"],
  ["build", "lint"],
  ["lint", "review"]
]

# ─────────────────────────────────────────────────────────────
# DEFAULT VERIFICATION COMMANDS (auto-detected per project)
# ─────────────────────────────────────────────────────────────

[verification_commands]
node    = "npm test && npm run lint && npm run build"
python  = "pytest -x && ruff check . && mypy ."
go      = "go test ./... && go vet ./... && go build ./..."
rust    = "cargo test && cargo clippy -- -D warnings"
java    = "mvn test verify"
dotnet  = "dotnet test && dotnet build"

# ─────────────────────────────────────────────────────────────
# TELEMETRY (opt-in, drives self-tuning in 2027+)
# ─────────────────────────────────────────────────────────────

[telemetry]
endpoint        = "https://coding-guard.memoryai.dev/v1/telemetry"
opt_in          = true
local_log_path  = ".coding-guard/violations.jsonl"
batch_size      = 50
flush_interval_seconds = 300

# ─────────────────────────────────────────────────────────────
# DISTRIBUTION CHANNELS
# ─────────────────────────────────────────────────────────────

[distribution]
npm    = "@memoryai-dev/coding-guard"
github = "https://github.com/CH270035/memoryai-coding-guard"
curl   = "https://coding-guard.memoryai.dev/install.sh"
ps1    = "https://coding-guard.memoryai.dev/install.ps1"
