id           = "code-review-and-quality"
title        = "Code Review and Quality"
phase        = "review"
source       = "https://github.com/addyosmani/agent-skills/blob/main/skills/code-review-and-quality/SKILL.md"
source_license = "MIT"
strengthens  = ["goal-driven", "surgical-changes"]

when = [
  "Before merging any change, regardless of size",
  "Before tagging a release",
  "When a change has been auto-generated and needs human-grade review",
]

process = [
  "Five-axis review: correctness, readability, architecture, security, performance",
  "Target ~100 lines per review session — split larger PRs",
  "Tag every finding with severity: Critical / Important / Nit / FYI",
  "Critical and Important must resolve before merge; Nits are optional",
  "The reviewer's job is to improve code health, not to enforce taste",
]

rationalizations = [
  { lie = "It's a small change, skip the review.",                     truth = "Small changes ship the most production incidents." },
  { lie = "I'll fix the nits in a follow-up.",                         truth = "Follow-ups never come. Fix or close, don't defer." },
  { lie = "The author is senior, just approve.",                       truth = "Seniority is not a substitute for an actual read." },
]

red_flags = [
  "PR approved within 60 seconds of being opened",
  "Review comments only on style, none on correctness",
  "Author is the only reviewer (self-merge)",
  "More than ~400 lines in a single review",
]

verification = [
  "Five-axis ratings recorded",
  "Zero unresolved Critical or Important findings before merge",
  "Tests pass on the merge commit",
]
